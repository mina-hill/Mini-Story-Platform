<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Register - Mini Story Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
  <nav class="navbar glass">
    <div class="nav-brand">
      <a href="/">MiniStory</a>
    </div>
  </nav>

  <main class="container auth-container">
    <div class="auth-card glass">
      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Login</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>
      
      <div id="auth-error" class="error-msg hidden"></div>
      
      <form id="auth-form" class="auth-form">
        <div class="form-group register-only hidden">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Jane Doe">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Login</button>
      </form>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
